# Azure Web App Deployment for Django Backend
name: Build and deploy Python app to Azure Web App - dorotheodentalclinic

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent concurrent deployments - queues new runs instead of running them in parallel
# This avoids the 409 Conflict error caused by overlapping ZIP deploys
concurrency:
  group: azure-production-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create and start virtual environment
        working-directory: ./dorotheo-dental-clinic-website/backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
        
      # Optional: Add step to run tests here (PyTest, Django test suites, etc.)
      
      - name: Collect static files
        working-directory: ./dorotheo-dental-clinic-website/backend
        run: |
          source venv/bin/activate
          python manage.py collectstatic --noinput
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: False
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          
      - name: Zip artifact for deployment
        working-directory: ./dorotheo-dental-clinic-website/backend
        run: |
          # Exclude unnecessary files from deployment
          zip -r ../../release.zip . \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "**/__pycache__/*" \
            -x "*.sqlite3" \
            -x "media/*" \
            -x "venv/*" \
            -x ".env*" \
            -x "*.log" \
            -x "*.md" \
            -x "tests/*" \
            -x "*.test.py" \
            -x ".git/*" \
            -x ".github/*"
          echo "Package size: $(du -h ../../release.zip)"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Wait for any active deployment to complete
        run: |
          # Parse Kudu credentials from publish profile XML
          PP='${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DOROTHOEDENTAL }}'
          KUDU_URL=$(echo "$PP" | grep -oP 'publishUrl="\K[^"]+' | head -1)
          USERNAME=$(echo "$PP" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PP" | grep -oP 'userPWD="\K[^"]+' | head -1)

          if [ -z "$KUDU_URL" ]; then
            echo "Could not parse Kudu URL from publish profile, skipping wait."
            exit 0
          fi

          echo "Checking active deployments at https://$KUDU_URL ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              -u "$USERNAME:$PASSWORD" \
              "https://$KUDU_URL/api/deployments/latest" 2>/dev/null || echo "000")
            
            STATUS=$(curl -sf -u "$USERNAME:$PASSWORD" \
              "https://$KUDU_URL/api/deployments/latest" 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', 3))" 2>/dev/null || echo "3")

            # Kudu deployment status: 0=pending, 1=building, 2=deploying, 3=success, 4=failed
            if [ "$STATUS" = "3" ] || [ "$STATUS" = "4" ] || [ "$HTTP_CODE" = "404" ]; then
              echo "No active deployment (status=$STATUS). Proceeding with deploy."
              break
            fi
            echo "Active deployment detected (status=$STATUS). Waiting 15s... [$i/12]"
            sleep 15
          done

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        id: deploy-to-webapp
        with:
          app-name: 'dorotheodentalclinic'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DOROTHOEDENTAL }}
          package: release.zip
