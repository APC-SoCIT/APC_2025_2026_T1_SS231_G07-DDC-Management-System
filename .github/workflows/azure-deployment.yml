# Azure Web App Deployment for Django Backend
name: Build and deploy Python app to Azure Web App - dorotheodentalclinic

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent concurrent deployments - queues new runs instead of running them in parallel
# This avoids the 409 Conflict error caused by overlapping ZIP deploys
concurrency:
  group: azure-production-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Guard: fail fast if required secrets are missing ─────────────────
      - name: Verify required secrets are set
        run: |
          MISSING=()
          [ -z "$SECRET_KEY"     ] && MISSING+=("SECRET_KEY")
          [ -z "$DATABASE_URL"   ] && MISSING+=("DATABASE_URL")
          [ -z "$GEMINI_API_KEY" ] && MISSING+=("GEMINI_API_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            echo "Add them in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets are set."
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Set up Python version
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create and start virtual environment
        working-directory: ./dorotheo-dental-clinic-website/backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Validate migrations can load (catches missing packages early) ─────
      - name: Check migrations load without errors
        working-directory: ./dorotheo-dental-clinic-website/backend
        run: |
          source venv/bin/activate
          python manage.py migrate --check --dry-run 2>&1 || true
          python -c "
          import django, os, sys
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'dental_clinic.settings')
          django.setup()
          from django.db.migrations.loader import MigrationLoader
          from django.db import connection
          # Just import — will raise if any migration file has a bad import
          loader = MigrationLoader(None, ignore_no_migrations=True)
          print('✅ All migration files imported successfully.')
          "
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: False
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Collect static files
        working-directory: ./dorotheo-dental-clinic-website/backend
        run: |
          source venv/bin/activate
          python manage.py collectstatic --noinput
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: False
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Zip artifact for deployment
        working-directory: ./dorotheo-dental-clinic-website/backend
        run: |
          # Exclude unnecessary files from deployment
          zip -r ../../release.zip . \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "**/__pycache__/*" \
            -x "*.sqlite3" \
            -x "media/*" \
            -x "venv/*" \
            -x ".env*" \
            -x "*.log" \
            -x "*.md" \
            -x "tests/*" \
            -x "*.test.py" \
            -x ".git/*" \
            -x ".github/*"
          echo "Package size: $(du -h ../../release.zip)"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Wait for any active deployment to complete
        run: |
          # Parse Kudu credentials from publish profile XML
          PP='${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DOROTHOEDENTAL }}'
          KUDU_URL=$(echo "$PP" | grep -oP 'publishUrl="\K[^"]+' | head -1)
          USERNAME=$(echo "$PP" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PP" | grep -oP 'userPWD="\K[^"]+' | head -1)

          if [ -z "$KUDU_URL" ]; then
            echo "Could not parse Kudu URL from publish profile, skipping wait."
            exit 0
          fi

          echo "Checking active deployments at https://$KUDU_URL ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              -u "$USERNAME:$PASSWORD" \
              "https://$KUDU_URL/api/deployments/latest" 2>/dev/null || echo "000")
            
            STATUS=$(curl -sf -u "$USERNAME:$PASSWORD" \
              "https://$KUDU_URL/api/deployments/latest" 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', 3))" 2>/dev/null || echo "3")

            # Kudu deployment status: 0=pending, 1=building, 2=deploying, 3=success, 4=failed
            if [ "$STATUS" = "3" ] || [ "$STATUS" = "4" ] || [ "$HTTP_CODE" = "404" ]; then
              echo "No active deployment (status=$STATUS). Proceeding with deploy."
              break
            fi
            echo "Active deployment detected (status=$STATUS). Waiting 15s... [$i/12]"
            sleep 15
          done

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        id: deploy-to-webapp
        with:
          app-name: 'dorotheodentalclinic'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DOROTHOEDENTAL }}
          package: release.zip

      # ── Post-deploy smoke tests ───────────────────────────────────────────
      # Wait for the app to restart, then verify critical endpoints are alive.
      - name: Smoke test — wait for app to be ready
        run: |
          echo "Waiting 60s for Azure to restart the app..."
          sleep 60

      - name: Smoke test — health check (app is up)
        run: |
          URL="https://dorotheodentalclinic-awhfd3hzhta6augb.southeastasia-01.azurewebsites.net"
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/" 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "404" ]; then
            echo "✅ App is responding (HTTP $HTTP)"
          else
            echo "❌ App returned HTTP $HTTP — deployment may have failed"
            exit 1
          fi

      - name: Smoke test — chatbot API is reachable
        run: |
          URL="https://dorotheodentalclinic-awhfd3hzhta6augb.southeastasia-01.azurewebsites.net"
          # POST a minimal chatbot message; expect 200 or 400 (auth), NOT 500
          HTTP=$(curl -sf -o /tmp/chatbot_resp.json -w "%{http_code}" \
            -X POST "$URL/api/chatbot/message/" \
            -H "Content-Type: application/json" \
            -d '{"message":"hello","session_id":"ci-smoke-test"}' \
            2>/dev/null || echo "000")
          cat /tmp/chatbot_resp.json 2>/dev/null || true
          if [ "$HTTP" = "500" ] || [ "$HTTP" = "000" ]; then
            echo "❌ Chatbot endpoint returned HTTP $HTTP — check logs"
            exit 1
          fi
          echo "✅ Chatbot endpoint is reachable (HTTP $HTTP)"

      - name: Smoke test — static files are served
        run: |
          URL="https://dorotheodentalclinic-awhfd3hzhta6augb.southeastasia-01.azurewebsites.net"
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/static/favicon.ico" 2>/dev/null \
            || curl -sf -o /dev/null -w "%{http_code}" "$URL/static/" 2>/dev/null \
            || echo "000")
          if [ "$HTTP" = "500" ] || [ "$HTTP" = "000" ]; then
            echo "⚠️  Static files unreachable (HTTP $HTTP) — check collectstatic / whitenoise"
          else
            echo "✅ Static files reachable (HTTP $HTTP)"
          fi
